<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №2.2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>Параметри</h2>
            
            <div class="settings">
                <div class="input-box">
                    <label>Швидкість v (м/с)</label>
                    <input type="number" id="v0" value="45">
                </div>
                <div class="input-box">
                    <label>Кут кидка (°)</label>
                    <input type="number" id="angle" value="45">
                </div>
                <div class="grid-inputs">
                    <div class="input-box">
                        <label>x (м)</label>
                        <input type="number" id="x0" value="0">
                    </div>
                    <div class="input-box">
                        <label>y (м)</label>
                        <input type="number" id="y0" value="0">
                    </div>
                </div>
                <div class="input-box">
                    <label>Колір лінії</label>
                    <input type="color" id="color" value="#2563eb">
                </div>
            </div>

            <button class="primary-btn" onclick="startSimulation()">Побудувати траєкторію</button>
            <button class="secondary-btn" onclick="resetProject()">Очистити все</button>

            <div class="results-card">
                <h3>Результати:</h3>
                <p>Дальність L: <strong id="resL">0</strong> м</p>
                <p>Висота H: <strong id="resH">0</strong> м</p>
                <p>Час t: <strong id="resT">0</strong> с</p>
            </div>
        </aside>

        <main class="chart-area">
            <svg id="axesLayer"></svg>
            <canvas id="trajectoryLayer"></canvas>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
